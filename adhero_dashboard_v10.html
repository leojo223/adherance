<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Adherence Tracker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #0a0a0f; color: #e0e0e0; font-size: 13px; }
  .app { min-height: 100vh; }

  .top-bar { background: #111118; border-bottom: 0.5px solid #2a2a3a; padding: 10px 16px; display: flex; justify-content: space-between; align-items: center; }
  .logo { font-size: 13px; font-weight: 600; letter-spacing: 0.08em; color: #fff; }
  .clock { color: #4fc3f7; font-size: 13px; font-weight: 500; text-align: right; line-height: 1.4; }
  .clock small { display: block; color: #666; font-size: 10px; font-weight: 400; }

  .queue-bar { background: #111118; border-bottom: 0.5px solid #2a2a3a; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; }
  .queue-label { color: #aaa; font-size: 12px; font-weight: 500; }
  .queue-sub { color: #555; font-size: 10px; margin-top: 2px; }
  .toggle { display: flex; align-items: center; gap: 8px; }
  .toggle-lbl { font-size: 11px; font-weight: 600; }
  .toggle-switch { width: 44px; height: 24px; border-radius: 12px; position: relative; cursor: pointer; transition: background 0.2s; }
  .toggle-switch.on { background: #4fc3f7; } .toggle-switch.off { background: #f44336; }
  .toggle-knob { width: 20px; height: 20px; background: #fff; border-radius: 50%; position: absolute; top: 2px; right: 2px; transition: right 0.2s; }
  .toggle-switch.off .toggle-knob { right: 22px; }

  .period-tabs { display: flex; background: #0d0d15; border-bottom: 0.5px solid #2a2a3a; }
  .period-tab { flex: 1; padding: 10px; text-align: center; font-size: 11px; font-weight: 500; color: #555; cursor: pointer; letter-spacing: 0.05em; border-bottom: 2px solid transparent; transition: all 0.15s; }
  .period-tab.active { color: #fff; border-bottom-color: #4fc3f7; background: #111118; }

  .metrics { display: grid; grid-template-columns: 1fr 1fr 1fr; border-bottom: 0.5px solid #2a2a3a; }
  .metric { padding: 16px; border-right: 0.5px solid #2a2a3a; }
  .metric:last-child { border-right: none; }
  .metric-val { font-size: 24px; font-weight: 600; line-height: 1; margin-bottom: 4px; }
  .metric-val.blue { color: #4fc3f7; } .metric-val.green { color: #4caf7d; } .metric-val.red { color: #f44336; }
  .metric-lbl { color: #555; font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; }

  .adherence-bar-section { padding: 12px 16px; border-bottom: 0.5px solid #2a2a3a; }
  .adherence-bar-header { display: flex; justify-content: space-between; margin-bottom: 8px; }
  .adherence-bar-title { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: #555; font-weight: 600; }
  .adherence-bar-pct { font-size: 11px; color: #4fc3f7; font-weight: 600; }
  .bar-track { height: 6px; background: #1e1e2a; border-radius: 3px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }
  .adherence-note { font-size: 10px; color: #555; padding: 6px 0 0; min-height: 18px; }
  .away-ticker { font-size: 10px; color: #f44336; padding: 2px 0 0; display: none; }

  .log-panel { margin: 0 16px; border-bottom: 0.5px solid #2a2a3a; padding: 12px 0; }
  .log-panel-title { font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: #444; font-weight: 600; margin-bottom: 10px; }
  .log-row { display: flex; gap: 8px; align-items: center; }
  .log-input { background: #0d0d15; border: 0.5px solid #2a2a3a; border-radius: 4px; color: #e0e0e0; font-size: 14px; padding: 8px 10px; width: 75px; outline: none; }
  .log-input:focus { border-color: #4fc3f7; }
  .log-reason { flex: 1; background: #0d0d15; border: 0.5px solid #2a2a3a; border-radius: 4px; color: #e0e0e0; font-size: 13px; padding: 8px 10px; outline: none; }
  .log-reason:focus { border-color: #4fc3f7; }
  .log-reason::placeholder { color: #444; }
  .log-btn { background: #f44336; color: #fff; border: none; border-radius: 4px; font-size: 12px; font-weight: 600; padding: 8px 16px; cursor: pointer; white-space: nowrap; letter-spacing: 0.04em; }
  .log-btn:hover { background: #d32f2f; }
  .log-hint { font-size: 10px; margin-top: 6px; min-height: 14px; }

  .away-log { margin: 0 16px; border-bottom: 0.5px solid #2a2a3a; padding: 10px 0; }
  .away-log-title { font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: #444; font-weight: 600; margin-bottom: 8px; }
  .away-log-entry { display: flex; align-items: center; padding: 6px 10px; background: #140a0a; border: 0.5px solid #2a1a1a; border-radius: 4px; margin-bottom: 4px; gap: 8px; }
  .away-log-time { color: #f44336; font-size: 11px; font-weight: 500; flex-shrink: 0; }
  .away-log-reason { color: #666; font-size: 11px; flex: 1; }
  .away-log-dur { color: #888; font-size: 10px; flex-shrink: 0; }
  .away-log-del { background: none; border: none; color: #333; font-size: 12px; cursor: pointer; padding: 0 2px; flex-shrink: 0; }
  .away-log-del:hover { color: #f44336; }

  .history-section { padding: 8px 16px 32px; }
  .history-label { font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: #444; padding: 10px 0; font-weight: 600; }
  .history-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 0.5px solid #1a1a2a; }
  .history-day { color: #888; font-size: 11px; min-width: 90px; }
  .history-bar-wrap { flex: 1; height: 4px; background: #1e1e2a; border-radius: 2px; overflow: hidden; }
  .history-bar { height: 100%; border-radius: 2px; transition: width 0.5s; }
  .history-pct { font-size: 11px; font-weight: 600; min-width: 36px; text-align: right; }
  .history-meta { color: #555; font-size: 10px; min-width: 100px; text-align: right; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
</style>
</head>
<body>
<div class="app">

  <div class="top-bar">
    <div class="logo">ADHERO.</div>
    <div class="clock" id="clock"></div>
  </div>

  <div class="queue-bar">
    <div>
      <div class="queue-label">Queue Status</div>
      <div class="queue-sub" id="queue-sub">Toggle when leaving or returning to queue</div>
    </div>
    <div class="toggle">
      <span class="toggle-lbl" id="gql" style="color:#4fc3f7">ON QUEUE</span>
      <div class="toggle-switch on" id="gqt" onclick="toggleGlobal()">
        <div class="toggle-knob"></div>
      </div>
    </div>
  </div>

  <div class="period-tabs">
    <div class="period-tab active" onclick="switchPeriod('daily')">DAILY</div>
    <div class="period-tab" onclick="switchPeriod('weekly')">WEEKLY</div>
    <div class="period-tab" onclick="switchPeriod('monthly')">MONTHLY</div>
  </div>

  <div class="metrics">
    <div class="metric"><div class="metric-val blue" id="m-adherence">—</div><div class="metric-lbl" id="m-adherence-lbl">Adherence</div></div>
    <div class="metric"><div class="metric-val green" id="m-onqueue">0m</div><div class="metric-lbl" id="m-onqueue-lbl">On Queue</div></div>
    <div class="metric"><div class="metric-val red" id="m-away">0m</div><div class="metric-lbl" id="m-away-lbl">Away</div></div>
  </div>

  <div class="adherence-bar-section">
    <div class="adherence-bar-header">
      <span class="adherence-bar-title" id="bar-title">Daily Adherence</span>
      <span class="adherence-bar-pct" id="bar-pct">—</span>
    </div>
    <div class="bar-track"><div class="bar-fill" id="bar-fill" style="width:0%"></div></div>
    <div class="adherence-note" id="adherence-note"></div>
    <div class="away-ticker" id="away-ticker"></div>
  </div>

  <div id="daily-view">
    <div class="log-panel">
      <div class="log-panel-title">Log Away Time</div>
      <div class="log-row">
        <input class="log-input" type="number" id="log-mins" min="1" max="960" placeholder="mins" onkeydown="if(event.key==='Enter')logAwayManual()" />
        <input class="log-reason" type="text" id="log-reason" placeholder="Reason (optional)" maxlength="40" onkeydown="if(event.key==='Enter')logAwayManual()" />
        <button class="log-btn" onclick="logAwayManual()">+ Log</button>
      </div>
      <div class="log-hint" id="log-hint"></div>
    </div>
    <div class="away-log">
      <div class="away-log-title" id="away-log-title">Away Log — Today</div>
      <div id="away-log-list"></div>
    </div>
  </div>

  <div id="weekly-view" style="display:none">
    <div class="history-section">
      <div class="history-label">This Week</div>
      <div id="weekly-list"></div>
    </div>
  </div>

  <div id="monthly-view" style="display:none">
    <div class="history-section">
      <div class="history-label">This Month</div>
      <div id="monthly-list"></div>
    </div>
  </div>

</div>
<script>
const WINDOW_START = 5 * 60 + 30;  // 5:30am in mins
const WINDOW_END   = 21 * 60 + 30; // 9:30pm in mins

const WEEKLY_DATA = [
  { day:'Sat 29 Mar', onQueue:120, away:5,  pct:96 },
  { day:'Sun 30 Mar', onQueue:null, away:null, pct:null, historical:true },
  { day:'Tue 31 Mar', onQueue:330, away:30, pct:92 },
  { day:'Wed 1 Apr',  onQueue:300, away:20, pct:94 },
  { day:'Thu 2 Apr',  onQueue:288, away:43, pct:87 },
  { day:'Fri 3 Apr',  onQueue:282, away:49, pct:85 },
  { day:'Sat 4 Apr',  onQueue:null, away:null, pct:null },
];
const MONTHLY_DATA = [...WEEKLY_DATA];

let globalQueue=true, awayStartedAt=null, currentPeriod='daily';

// localStorage
const SEED={'2026-03-31':30*60,'2026-04-01':20*60,'2026-04-02':43*60,'2026-04-03':49*60,'2026-04-04':65*60};
function loadStorage(){ try{ return JSON.parse(localStorage.getItem('adhero_away')||'null'); }catch(e){ return null; } }
function saveStorage(d){ try{ localStorage.setItem('adhero_away',JSON.stringify(d)); }catch(e){} }
let awayStore=loadStorage();
if(!awayStore){
  awayStore={byDate:{},entries:{}};
  Object.entries(SEED).forEach(([k,v])=>{ awayStore.byDate[k]=v; awayStore.entries[k]=[]; });
  saveStorage(awayStore);
}
const awayByDate=awayStore.byDate, awayEntries=awayStore.entries;

// NZT
function nztNow(){
  const s=new Date().toLocaleString('en-NZ',{timeZone:'Pacific/Auckland',year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});
  const [dp,tp]=s.split(', ');
  const [dd,mm,yyyy]=dp.split('/').map(Number);
  const [hh,min,ss]=tp.split(':').map(Number);
  return{year:yyyy,month:mm,day:dd,hours:hh===24?0:hh,minutes:min,seconds:ss};
}
function todayKey(){ const n=nztNow(); return `${n.year}-${String(n.month).padStart(2,'0')}-${String(n.day).padStart(2,'0')}`; }
function awayAccruedToday(){ return awayByDate[todayKey()]||0; }
function addAwayToday(secs){ const k=todayKey(); awayByDate[k]=(awayByDate[k]||0)+secs; awayStore.byDate[k]=awayByDate[k]; saveStorage(awayStore); }
function nowMins(){ const n=nztNow(); return n.hours*60+n.minutes; }
function nowSecs(){ return Date.now()/1000; }
function totalAwaySecs(){ let t=awayAccruedToday(); if(!globalQueue&&awayStartedAt!==null)t+=(nowSecs()-awayStartedAt); return t; }

function fmtMins(m){ m=Math.round(Math.abs(m)); const h=Math.floor(m/60),mm=m%60; return h&&mm?h+'h '+mm+'m':h?h+'h':mm+'m'; }
function fmtSecs(s){ s=Math.round(s); const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),ss=s%60; return h?h+'h '+m+'m':m?m+'m '+ss+'s':ss+'s'; }
function barColor(p){ return p>=80?'#4caf7d':p>=50?'#ef9f27':'#f44336'; }

function calcDaily(){
  const now=nowMins();
  const elapsed=Math.max(0,Math.min(now,WINDOW_END)-WINDOW_START);
  const awaySecs=totalAwaySecs();
  const awayMins=Math.min(awaySecs/60,elapsed);
  const onQueueMins=Math.max(0,elapsed-awayMins);
  const pct=elapsed>0?Math.round((onQueueMins/elapsed)*100):null;
  return{onQueueMins,awayMins,awaySecs,elapsed,pct};
}
function calcWeekly(){
  const d=calcDaily(); let oq=0,aw=0;
  WEEKLY_DATA.forEach(x=>{ if(x.onQueue!==null){oq+=x.onQueue;aw+=x.away;} });
  oq+=Math.round(d.onQueueMins); aw+=Math.round(d.awayMins);
  const t=oq+aw; return{onQueueMins:oq,awayMins:aw,pct:t>0?Math.round((oq/t)*100):null};
}
function calcMonthly(){
  const d=calcDaily(); let oq=0,aw=0;
  MONTHLY_DATA.forEach(x=>{ if(x.onQueue!==null){oq+=x.onQueue;aw+=x.away;} });
  oq+=Math.round(d.onQueueMins); aw+=Math.round(d.awayMins);
  const t=oq+aw; return{onQueueMins:oq,awayMins:aw,pct:t>0?Math.round((oq/t)*100):null};
}

function updateMetrics(){
  const p=currentPeriod;
  const a=p==='daily'?calcDaily():p==='weekly'?calcWeekly():calcMonthly();
  const label=p==='daily'?'Daily':p==='weekly'?'Weekly':'Monthly';
  const pctStr=a.pct!==null?a.pct+'%':'—';
  const pct=a.pct||0;
  document.getElementById('m-adherence').textContent=pctStr;
  document.getElementById('m-adherence-lbl').textContent=label+' Adh.';
  document.getElementById('m-onqueue-lbl').textContent=p==='daily'?'On Queue':'Total On Queue';
  document.getElementById('m-away-lbl').textContent='Away';
  document.getElementById('bar-title').textContent=label+' Adherence';
  document.getElementById('bar-pct').textContent=pctStr;
  document.getElementById('bar-fill').style.cssText=`width:${pct}%;background:${barColor(pct)}`;
  document.getElementById('m-onqueue').textContent=fmtMins(a.onQueueMins||0);
  document.getElementById('m-away').textContent=fmtMins(a.awayMins||0);
  if(p==='daily'){
    const now=nowMins(), inWindow=now>=WINDOW_START&&now<WINDOW_END;
    const parts=[];
    if(a.onQueueMins>0)parts.push(fmtMins(a.onQueueMins)+' on queue');
    if(a.awayMins>0)parts.push(fmtMins(a.awayMins)+' away');
    if(inWindow)parts.push(fmtMins(WINDOW_END-now)+' remaining');
    document.getElementById('adherence-note').textContent=parts.join(' · ')||'Window: 5:30am – 9:30pm NZT';
    const ticker=document.getElementById('away-ticker');
    if(!globalQueue){ticker.style.display='block';ticker.textContent='● Away — '+fmtSecs(a.awaySecs)+' accrued';}
    else if(a.awaySecs>0){ticker.style.display='block';ticker.textContent=fmtSecs(a.awaySecs)+' away time recorded today';}
    else ticker.style.display='none';
  } else {
    document.getElementById('adherence-note').textContent='';
    document.getElementById('away-ticker').style.display='none';
  }
}

function renderHistory(){
  const daily=calcDaily();
  const dataset=currentPeriod==='weekly'?WEEKLY_DATA:MONTHLY_DATA;
  const listId=currentPeriod==='weekly'?'weekly-list':'monthly-list';
  document.getElementById(listId).innerHTML=dataset.map(d=>{
    const isToday=d.pct===null&&!d.historical, noData=d.historical;
    const pct=isToday?(daily.pct||0):noData?0:d.pct;
    const oq=isToday?Math.round(daily.onQueueMins):noData?0:d.onQueue;
    const aw=isToday?Math.round(daily.awayMins):noData?0:d.away;
    const c=barColor(pct);
    const tag=isToday?' <span style="color:#4fc3f7;font-size:9px">(live)</span>':noData?' <span style="color:#555;font-size:9px">(no data)</span>':'';
    return `<div class="history-row">
      <div class="history-day">${d.day}${tag}</div>
      <div class="history-bar-wrap"><div class="history-bar" style="width:${noData?0:pct}%;background:${c}"></div></div>
      <div class="history-pct" style="color:${noData?'#444':c}">${noData?'—':pct+'%'}</div>
      <div class="history-meta">${noData?'—':`${fmtMins(oq)} on · ${fmtMins(aw)} away`}</div>
    </div>`;
  }).join('');
}

function switchPeriod(p){
  currentPeriod=p;
  document.querySelectorAll('.period-tab').forEach((t,i)=>t.classList.toggle('active',['daily','weekly','monthly'][i]===p));
  ['daily','weekly','monthly'].forEach(x=>document.getElementById(x+'-view').style.display=x===p?'block':'none');
  updateMetrics();
  if(p!=='daily')renderHistory();
}

function toggleGlobal(){
  globalQueue=!globalQueue;
  if(!globalQueue){awayStartedAt=nowSecs();}
  else{if(awayStartedAt!==null){addAwayToday(nowSecs()-awayStartedAt);awayStartedAt=null;}}
  const tog=document.getElementById('gqt'),lbl=document.getElementById('gql'),sub=document.getElementById('queue-sub');
  tog.className='toggle-switch '+(globalQueue?'on':'off');
  lbl.textContent=globalQueue?'ON QUEUE':'OFF QUEUE';
  lbl.style.color=globalQueue?'#4fc3f7':'#f44336';
  sub.textContent=globalQueue?'Toggle when leaving or returning to queue':'Away time is being tracked…';
  updateMetrics();
}

function logAwayManual(){
  const minsEl=document.getElementById('log-mins'), reasonEl=document.getElementById('log-reason'), hint=document.getElementById('log-hint');
  const mins=parseFloat(minsEl.value);
  if(!mins||mins<=0||mins>960){hint.style.color='#f44336';hint.textContent='Enter a valid number of minutes.';return;}
  const reason=reasonEl.value.trim()||'Manual entry', k=todayKey();
  awayByDate[k]=(awayByDate[k]||0)+mins*60; awayStore.byDate[k]=awayByDate[k];
  if(!awayEntries[k])awayEntries[k]=[];
  const n=nztNow(),pad=x=>String(x).padStart(2,'0');
  awayEntries[k].push({mins,reason,ts:`${pad(n.hours)}:${pad(n.minutes)}`});
  awayStore.entries[k]=awayEntries[k]; saveStorage(awayStore);
  minsEl.value=''; reasonEl.value='';
  hint.style.color='#4caf7d'; hint.textContent=`✓ ${mins}m logged (${reason})`;
  setTimeout(()=>{hint.textContent='';},3000);
  renderAwayLog(); updateMetrics();
}

function deleteAwayEntry(k,i){
  if(!awayEntries[k]||!awayEntries[k][i])return;
  const mins=awayEntries[k][i].mins;
  awayEntries[k].splice(i,1);
  awayByDate[k]=Math.max(0,(awayByDate[k]||0)-mins*60);
  awayStore.byDate[k]=awayByDate[k]; awayStore.entries[k]=awayEntries[k]; saveStorage(awayStore);
  renderAwayLog(); updateMetrics();
}

function renderAwayLog(){
  const k=todayKey(), entries=awayEntries[k]||[], list=document.getElementById('away-log-list');
  if(!entries.length){list.innerHTML='<div style="color:#444;font-size:11px;padding:4px 0">No entries yet today.</div>';return;}
  list.innerHTML=entries.map((e,i)=>`
    <div class="away-log-entry">
      <span class="away-log-time">${e.ts}</span>
      <span class="away-log-reason">${e.reason}</span>
      <span class="away-log-dur">−${e.mins}m</span>
      <button class="away-log-del" onclick="deleteAwayEntry('${k}',${i})" title="Remove">✕</button>
    </div>`).join('');
}

function tick(){
  const n=nztNow(),pad=x=>String(x).padStart(2,'0');
  const days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const nztDate=new Date(new Date().toLocaleString('en-US',{timeZone:'Pacific/Auckland'}));
  document.getElementById('clock').innerHTML=`${pad(n.hours)}:${pad(n.minutes)}:${pad(n.seconds)}<small>${days[nztDate.getDay()]}, ${n.day} ${months[n.month-1]} ${n.year} NZT</small>`;
  document.getElementById('away-log-title').textContent=`Away Log — Today (${n.day} ${months[n.month-1]})`;
  updateMetrics();
  if(currentPeriod!=='daily')renderHistory();
}

tick(); renderAwayLog();
setInterval(tick,1000);
</script>
</body>
</html>
